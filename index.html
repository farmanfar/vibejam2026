<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The Hired Swords</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
      }
      body {
        background: #0a0a0a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        min-height: 100dvh;
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        overflow: hidden;
      }
      #game-container {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #instant-shell {
        position: fixed; inset: 0;
        background: #111118;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        pointer-events: none; z-index: 999;
        transition: opacity 0.15s;
      }
      #instant-shell.hidden { opacity: 0; }
      .is-title {
        font-family: monospace; font-size: 24px;
        letter-spacing: 6px; color: #e0c87a;
      }
      .is-sub {
        font-family: monospace; font-size: 11px;
        color: #555; margin-top: 10px; letter-spacing: 2px;
      }
    </style>
  </head>
  <body>
    <div id="instant-shell">
      <div class="is-title">THE HIRED SWORDS</div>
      <div class="is-sub">AN AUTO-BATTLER ROGUELIKE</div>
    </div>
    <div id="game-container"></div>
    <script type="module" src="/src/main.js"></script>
    <script async src="https://vibej.am/2026/widget.js"></script>
  </body>
</html>
